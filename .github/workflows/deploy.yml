name: Deploy to Azure AKS

# Triggers on version tags (e.g. v1.0.0) or manual dispatch
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}

jobs:
  # ── Job 1: Run all tests ────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog-service, loan-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      rabbitmq:
        image: rabbitmq:3.13-alpine
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit -v

      - name: Run integration tests
        run: uv run pytest tests/integration -v
        env:
          TEST_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test_db"
          TEST_RABBITMQ_URL: "amqp://guest:guest@localhost:5672/"

  # ── Job 2: Build & push Docker images to ACR ───────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag version
        id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $(echo $ACR_LOGIN_SERVER | cut -d'.' -f1)

      - name: Build & push catalog-service
        run: |
          docker build -t $ACR_LOGIN_SERVER/catalog-service:${{ steps.version.outputs.TAG }} \
                       -t $ACR_LOGIN_SERVER/catalog-service:latest \
                       ./catalog-service
          docker push $ACR_LOGIN_SERVER/catalog-service:${{ steps.version.outputs.TAG }}
          docker push $ACR_LOGIN_SERVER/catalog-service:latest

      - name: Build & push loan-service
        run: |
          docker build -t $ACR_LOGIN_SERVER/loan-service:${{ steps.version.outputs.TAG }} \
                       -t $ACR_LOGIN_SERVER/loan-service:latest \
                       ./loan-service
          docker push $ACR_LOGIN_SERVER/loan-service:${{ steps.version.outputs.TAG }}
          docker push $ACR_LOGIN_SERVER/loan-service:latest

      - name: Build & push frontend
        run: |
          docker build -t $ACR_LOGIN_SERVER/frontend:${{ steps.version.outputs.TAG }} \
                       -t $ACR_LOGIN_SERVER/frontend:latest \
                       ./frontend
          docker push $ACR_LOGIN_SERVER/frontend:${{ steps.version.outputs.TAG }}
          docker push $ACR_LOGIN_SERVER/frontend:latest

    outputs:
      tag: ${{ steps.version.outputs.TAG }}

  # ── Job 3: Deploy to AKS ────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --overwrite-existing

      - name: Update image tags in manifests
        run: |
          TAG=${{ needs.build-push.outputs.tag }}
          sed -i "s|libraryhubackr.azurecr.io/catalog-service:latest|$ACR_LOGIN_SERVER/catalog-service:$TAG|g" k8s/azure/catalog-service.yaml
          sed -i "s|libraryhubackr.azurecr.io/loan-service:latest|$ACR_LOGIN_SERVER/loan-service:$TAG|g" k8s/azure/loan-service.yaml
          sed -i "s|libraryhubackr.azurecr.io/frontend:latest|$ACR_LOGIN_SERVER/frontend:$TAG|g" k8s/azure/frontend.yaml

      - name: Apply ConfigMap
        run: kubectl apply -f k8s/azure/configmap.yaml

      - name: Create/update DB URL secrets
        run: |
          # In-cluster PostgreSQL — no SSL, use service DNS names
          CATALOG_URL="postgresql+asyncpg://postgres:${{ secrets.DB_CATALOG_PASSWORD }}@catalog-db/catalog_db"
          LOAN_URL="postgresql+asyncpg://postgres:${{ secrets.DB_LOAN_PASSWORD }}@loan-db/loan_db"

          kubectl create secret generic libraryhub-secrets \
            --from-literal=catalog-db-user="postgres" \
            --from-literal=catalog-db-password="${{ secrets.DB_CATALOG_PASSWORD }}" \
            --from-literal=catalog-db-name="catalog_db" \
            --from-literal=catalog-database-url="$CATALOG_URL" \
            --from-literal=loan-db-user="postgres" \
            --from-literal=loan-db-password="${{ secrets.DB_LOAN_PASSWORD }}" \
            --from-literal=loan-db-name="loan_db" \
            --from-literal=loan-database-url="$LOAN_URL" \
            --from-literal=rabbitmq-user="guest" \
            --from-literal=rabbitmq-password="guest" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply infrastructure (PostgreSQL + RabbitMQ in-cluster)
        run: |
          kubectl apply -f k8s/azure/infra.yaml
          kubectl wait --for=condition=available deployment/catalog-db --timeout=300s
          kubectl wait --for=condition=available deployment/loan-db --timeout=300s
          kubectl wait --for=condition=available deployment/rabbitmq --timeout=300s

      - name: Deploy application services
        run: |
          kubectl apply -f k8s/azure/catalog-service.yaml
          kubectl apply -f k8s/azure/loan-service.yaml
          kubectl apply -f k8s/azure/frontend.yaml

      - name: Apply Ingress
        run: kubectl apply -f k8s/azure/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/catalog-service --timeout=180s
          kubectl rollout status deployment/loan-service --timeout=180s
          kubectl rollout status deployment/frontend --timeout=120s

      - name: Run seed job (idempotent)
        run: |
          # Delete old job if exists (jobs are immutable)
          kubectl delete job catalog-seed --ignore-not-found=true
          kubectl apply -f k8s/azure/seed-job.yaml
          kubectl wait --for=condition=complete job/catalog-seed --timeout=120s

      - name: Deployment summary
        run: |
          echo "✅ LibraryHub ${{ needs.build-push.outputs.tag }} deployed successfully!"
          echo "Pods:"
          kubectl get pods
          echo ""
          echo "Ingress:"
          kubectl get ingress






