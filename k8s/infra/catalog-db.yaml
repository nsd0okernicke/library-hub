# ── catalog-db: PostgreSQL for Catalog Service ────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: catalog-db-pvc
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-db
  namespace: default
  labels:
    app: catalog-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: libraryhub-secrets
                  key: catalog-db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: libraryhub-secrets
                  key: catalog-db-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: libraryhub-secrets
                  key: catalog-db-name
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "catalog", "-d", "catalog_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "catalog", "-d", "catalog_db"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: catalog-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: default
spec:
  selector:
    app: catalog-db
  ports:
    - port: 5432
      targetPort: 5432

