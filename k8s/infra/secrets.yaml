apiVersion: v1
kind: Secret
metadata:
  name: libraryhub-secrets
  namespace: default
type: Opaque
# Values are base64-encoded. To encode: echo -n "value" | base64
# catalog   → Y2F0YWxvZw==
# password  → cGFzc3dvcmQ=
# loan      → bG9hbg==
# guest     → Z3Vlc3Q=
data:
  catalog-db-user:     Y2F0YWxvZw==   # catalog
  catalog-db-password: cGFzc3dvcmQ=   # password
  catalog-db-name:     Y2F0YWxvZ19kYg==  # catalog_db
  loan-db-user:        bG9hbg==       # loan
  loan-db-password:    cGFzc3dvcmQ=   # password
  loan-db-name:        bG9hbl9kYg==   # loan_db
  rabbitmq-user:       Z3Vlc3Q=       # guest
  rabbitmq-password:   Z3Vlc3Q=       # guest

