apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  labels:
    app: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: catalog-service:latest
          imagePullPolicy: Never   # use minikube's local docker daemon
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: libraryhub-config
                  key: CATALOG_DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: libraryhub-config
                  key: CATALOG_RABBITMQ_URL
            - name: RABBITMQ_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: libraryhub-config
                  key: CATALOG_RABBITMQ_EXCHANGE
            - name: RABBITMQ_QUEUE_LOAN_REQUESTED
              valueFrom:
                configMapKeyRef:
                  name: libraryhub-config
                  key: CATALOG_RABBITMQ_QUEUE_LOAN_REQUESTED
            - name: RABBITMQ_QUEUE_BOOK_RETURNED
              valueFrom:
                configMapKeyRef:
                  name: libraryhub-config
                  key: CATALOG_RABBITMQ_QUEUE_BOOK_RETURNED
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  selector:
    app: catalog-service
  ports:
    - port: 8000
      targetPort: 8000

