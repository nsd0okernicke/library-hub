# ── Seed Job: Azure AKS ───────────────────────────────────────────────────────
# Connects to Azure PostgreSQL Flexible Server instead of in-cluster postgres.
# The seed job runs once during the first deployment via GitHub Actions.
apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-seed
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait until in-cluster catalog-db PostgreSQL is reachable before running psql
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h catalog-db -U postgres -d catalog_db; do
                echo "Waiting for catalog-db..."; sleep 3;
              done
      containers:
        - name: seed
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - psql "host=catalog-db dbname=catalog_db user=postgres sslmode=disable" -f /seed/seed_books.sql
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: libraryhub-secrets
                  key: catalog-db-password
          volumeMounts:
            - name: seed-sql
              mountPath: /seed
      volumes:
        - name: seed-sql
          configMap:
            name: catalog-seed-sql
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-seed-sql
data:
  seed_books.sql: |
