# ── Ingress for Azure AKS: API routes (with path rewrite) ─────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: libraryhub-api-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/catalog(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: catalog-service
                port:
                  number: 8000
          - path: /api/loan(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: loan-service
                port:
                  number: 8001
---
# ── Ingress for Azure AKS: Frontend (no rewrite) ──────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: libraryhub-frontend-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

