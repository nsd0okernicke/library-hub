# ── Ingress for Azure AKS ─────────────────────────────────────────────────────
# Uses nip.io wildcard DNS — no manual DNS configuration needed.
# The hostname is automatically derived from the LoadBalancer IP.
# e.g. IP 4.175.63.160 → 4.175.63.160.nip.io
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: libraryhub-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/catalog(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: catalog-service
                port:
                  number: 8000
          - path: /api/loans(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: loan-service
                port:
                  number: 8001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
